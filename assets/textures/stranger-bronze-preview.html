<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>STRANGER bronze plate</title>
  <style>
    html, body { margin: 0; background: #111; color: #ccc; font: 14px/1.4 system-ui, sans-serif; }
    main { padding: 24px; }
    canvas { display: block; max-width: 100%; height: auto; border: 1px solid #333; }
  </style>
</head>
<body>
  <main>
    <p id="label">STRANGER bronze plate</p>
    <div id="out"></div>
  </main>
  <script type="module">
    import { paintStrangerBronzePlate } from '../../src/textures/strangerBronzePlate.js';
    const probe = document.createElement('canvas').getContext('2d');
    probe.font = '88px "Alfa Slab One", "Russo One", "Arial Black", Impact, serif';
    const needW = probe.measureText('STRANGER').width + 96;
    const c = document.createElement('canvas');
    const { width, height } = paintStrangerBronzePlate(c, needW);
    document.getElementById('label').textContent =
      `STRANGER bronze plate (${width}×${height}, procedural — kiss is live in-game only)`;
    document.getElementById('out').appendChild(c);
  </script>
</body>
</html>
