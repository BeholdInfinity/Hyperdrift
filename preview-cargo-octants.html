<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cargo octants — bullets & shells</title>
  <style>
    body {
      margin: 0;
      background: #1a222c;
      color: #c8d0d8;
      font: 14px/1.4 system-ui, sans-serif;
      padding: 24px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { margin: 0 0 20px; opacity: 0.7; font-size: 13px; }
    canvas { display: block; background: #243040; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>8-dir cargo sprites (game draw)</h1>
  <p>Top: BULLETS · Bottom: SHELLS · Octants: E, SE, S, SW, W, NW, N, NE</p>
  <canvas id="c" width="960" height="320"></canvas>
  <script type="module">
    import { HangarBay } from './src/world/HangarBay.js';

    const CREW_VIS_OCT = Math.PI / 4;
    const labels = ['E', 'SE', 'S', 'SW', 'W', 'NW', 'N', 'NE'];

    const bay = new HangarBay();
    const bullets = {
      id: 1,
      label: 'BULLETS',
      family: 'cargo',
      shape: 'bullets',
      w: 9,
      h: 6,
      color: '#4a3428',
      accent: '#c9a020',
      restHeading: 0,
    };
    const shells = {
      id: 2,
      label: 'SHELLS',
      family: 'cargo',
      shape: 'shells',
      w: 9,
      h: 7,
      color: '#4a5230',
      accent: '#d0a048',
      restHeading: 0,
    };

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#243040';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cellW = 120;
    const rowY = [90, 230];

    for (let oct = 0; oct < 8; oct++) {
      const heading = oct * CREW_VIS_OCT;
      const x = 60 + oct * cellW;
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x - 50, 20, 100, 280);
      ctx.fillStyle = '#9aacbc';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(labels[oct], x, 40);

      bay._drawCargoItem(ctx, bullets, x, rowY[0], 1.35, heading);
      bay._drawCargoItem(ctx, shells, x, rowY[1], 1.35, heading);
    }

    ctx.fillStyle = '#9aacbc';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('BULLETS', 8, rowY[0] + 4);
    ctx.fillText('SHELLS', 8, rowY[1] + 4);

    // Expose PNG for capture tools
    window.__cargoSpriteDataUrl = canvas.toDataURL('image/png');
    document.title = 'cargo-octants-ready';
  </script>
</body>
</html>
